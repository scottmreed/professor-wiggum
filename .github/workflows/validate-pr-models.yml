name: PR Model Strategy Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'traces/**'

jobs:
  validate-models:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Validate PR model strategy
        run: |
          python scripts/validate_pr_model_strategy.py \
            --base-ref "${{ github.event.pull_request.base.sha }}" \
            --head-ref "${{ github.sha }}"
