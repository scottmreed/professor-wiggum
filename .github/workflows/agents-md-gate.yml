name: AGENTS.md Consistency Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'mechanistic_agent/tool_schemas.py'
      - 'mechanistic_agent/api/app.py'
      - 'AGENTS.md'

jobs:
  agents-md-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate AGENTS.md consistency
        run: python scripts/validate_agents_md.py
