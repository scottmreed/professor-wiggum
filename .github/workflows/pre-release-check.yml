name: Pre-Release Verification Check

on:
  push:
    tags:
      - 'v*'

jobs:
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Check verification status
        run: python scripts/pre_release_verification.py
