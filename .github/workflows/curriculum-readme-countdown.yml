name: Curriculum README Refresh

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: curriculum-readme-refresh
  cancel-in-progress: true

jobs:
  refresh-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e . --no-deps

      - name: Refresh curriculum README
        run: python main.py curriculum render-readme

      - name: Commit refreshed curriculum files
        run: |
          if git diff --quiet -- README.md curriculum/generated/readme_context.json curriculum/generated/leaderboard_opus.json; then
            echo "No curriculum README changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md curriculum/generated/readme_context.json curriculum/generated/leaderboard_opus.json
          git commit -m "docs(curriculum): refresh readme context"
          git push
